<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тестирование завершено</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #151c26;
      --border: rgba(100, 180, 140, 0.18);
      --accent: #5ec98a;
      --accent2: #3fa86d;
      --text: #e8f0ec;
      --muted: #7a9e8a;
      --glow: rgba(94, 201, 138, 0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* Сетка фона */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(94,201,138,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(94,201,138,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

 


    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3.5rem 4rem;
      max-width: 580px;
      width: 100%;
      text-align: center;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(94,201,138,0.06),
        0 32px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.04);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Угловые акценты */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }




    .icon-wrap svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.7s ease 1s forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .label {
      font-family: 'Raleway', sans-serif;
      font-weight: 500;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.8s forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 4vw, 2.3rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.95s forwards;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 1.4rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 1.05s forwards;
    }

    p {
      font-size: 0.97rem;
      line-height: 1.75;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.5s ease 1.15s forwards;
    }

    .meta {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-top: 2.4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.5s ease 1.3s forwards;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .meta-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .meta-lbl {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: rgba(122,158,138,0.5);
      opacity: 0;
      animation: fadeUp 0.5s ease 1.45s forwards;
    }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 2rem; }
      .meta { gap: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="glow-blob"></div>
  <div class="wrapper">
    <div class="card">

      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <div class="label">Учебное тестирование</div>
      <h1>Тестирование №2 завершено</h1>
      <div class="divider"></div>

      <p>
        Выполненные работы переданы на проверку.
        Результаты будут объявлены преподавателем.
      </p>



      <div class="footer-note">
        Страницу можно закрыть
      </div>

    </div>
  </div>

  <script>

  </script>
</body>
</html>
